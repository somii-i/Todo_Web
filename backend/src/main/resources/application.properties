# Server Port - Defaults to 8080 locally, but uses the PORT env var when deployed on Render
server.port=${PORT:8080}

# PostgreSQL Connection settings
# Use DATABASE_URL from environment variables if present (Render), otherwise fallback to localhost
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/todo_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
